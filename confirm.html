<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robinson House Learn — Confirming your account</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --charcoal: #1C1C1E;
    --amber: #E8A020;
    --amber-light: #FDF3E0;
    --amber-dark: #C8851A;
    --blue: #0066F5;
    --teal: #0F9E76;
    --teal-light: #E1F8F0;
    --muted: #8A8A85;
    --border: #E8E8E4;
    --red: #C0392B;
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #FFFFFF;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }
  .card {
    max-width: 460px;
    width: 100%;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
  }
  .logo-mark {
    width: 48px; height: 48px;
    background: var(--blue);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 20px;
    margin: 0 auto 1.5rem;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    margin: 0 auto 1.25rem;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 8px;
  }
  p { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .icon-success {
    width: 56px; height: 56px;
    background: var(--teal-light);
    color: var(--teal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 1.25rem;
  }
  .icon-error {
    width: 56px; height: 56px;
    background: #FBEAEA;
    color: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 1.25rem;
  }
  .btn {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 13px 32px;
    background: var(--blue);
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
  }
  .debug {
    margin-top: 1rem;
    font-size: 11px;
    color: var(--muted);
    word-break: break-all;
    text-align: left;
    background: #f8f8f8;
    padding: 8px;
    border-radius: 6px;
    display: none;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-mark">R</div>
  <div id="content">
    <div class="spinner"></div>
    <h1>Confirming your account...</h1>
    <p>Just a moment while we finish setting things up.</p>
  </div>
  <div id="debug" class="debug"></div>
</div>

<script>
  const SUPABASE_URL = 'https://hinsbtiahzgccnjyovvc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnNidGlhaHpnY2NuanlvdnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjM0MjQsImV4cCI6MjA5ODM5OTQyNH0.aza9Xin6Qa3qAncGVl3P1TLGstKpA83Bqs8DywBoGyw';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function log(msg) {
    console.log('[confirm]', msg);
    const el = document.getElementById('debug');
    el.style.display = 'block';
    el.innerHTML += msg + '<br>';
  }

  function showError(msg) {
    document.getElementById('content').innerHTML =
      '<div class="icon-error">!</div>' +
      '<h1>Something went wrong</h1>' +
      '<p>' + msg + '</p>' +
      '<a href="/login.html" class="btn">Back to sign in</a>';
  }

  function showSuccess(name) {
    document.getElementById('content').innerHTML =
      '<div class="icon-success">✓</div>' +
      '<h1>You\'re all set' + (name ? ', ' + name.split(' ')[0] + '!' : '!') + '</h1>' +
      '<p>Your account is confirmed and ready. Head to your dashboard to get started.</p>' +
      '<a href="/dashboard.html" class="btn">Go to my dashboard →</a>';
  }

  async function finishSetup() {
    // Parse tokens directly from the URL hash ourselves
    // This is the most reliable method regardless of Supabase client version
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');

    log('type=' + type + ' hasToken=' + !!accessToken);

    if (!accessToken) {
      // No token in hash — check if there's already an active session
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        log('existing session found');
        await createLearnerRecord(session.user);
      } else {
        showError('No confirmation token found. The link may have expired. Please try signing up again.');
      }
      return;
    }

    // Set the session manually using the tokens from the URL
    log('setting session from URL tokens...');
    const { data, error } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken
    });

    if (error || !data.session) {
      log('setSession error: ' + (error ? error.message : 'no session'));
      showError('Your confirmation link has expired or is invalid. Please try signing up again.');
      return;
    }

    log('session set, user=' + data.session.user.email);
    await createLearnerRecord(data.session.user);
  }

  async function createLearnerRecord(user) {
    const meta = user.user_metadata || {};
    log('creating learner for ' + user.email);

    // Check for existing learner record first
    const { data: existing } = await sb
      .from('learners')
      .select('id, full_name')
      .eq('auth_user_id', user.id)
      .maybeSingle();

    if (existing) {
      log('learner already exists');
      showSuccess(existing.full_name);
      return;
    }

    // Create the learner record
    const { data: learner, error: learnerErr } = await sb
      .from('learners')
      .insert({
        auth_user_id: user.id,
        email: user.email,
        full_name: meta.fullName || null,
        organization_name: meta.org || null
      })
      .select()
      .single();

    if (learnerErr) {
      log('learner insert error: ' + learnerErr.message);
      showError('Your email was confirmed but we had trouble finishing your profile setup. Please contact cleveland@incrhouse.com');
      return;
    }

    log('learner created: ' + learner.id);

    // Handle cohort enrollment if they signed up with an access code
    if (meta.cohortId) {
      const { data: cohort } = await sb
        .from('cohorts')
        .select('*')
        .eq('id', meta.cohortId)
        .single();

      if (cohort) {
        await sb.from('enrollments').insert({
          learner_id: learner.id,
          course_id: cohort.course_id,
          cohort_id: cohort.id,
          enrollment_type: 'cohort'
        });
        await sb.from('cohorts').update({
          seats_used: (cohort.seats_used || 0) + 1
        }).eq('id', cohort.id);
        log('enrolled in cohort: ' + cohort.name);
      }
    }

    showSuccess(meta.fullName);
  }

  finishSetup();
</script>

</body>
</html>
