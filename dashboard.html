<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robinson House Learn — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --charcoal: #1C1C1E;
    --amber: #E8A020;
    --amber-light: #FDF3E0;
    --amber-dark: #C8851A;
    --blue: #0066F5;
    --blue-light: #EAF1FF;
    --blue-dark: #0050C2;
    --teal: #0F9E76;
    --teal-light: #E1F8F0;
    --navy: #1A3A5C;
    --body: #3D3D3A;
    --muted: #8A8A85;
    --soft-gray: #F5F5F3;
    --white: #FFFFFF;
    --border: #E8E8E4;
    --red: #C0392B;
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--body);
    background: var(--soft-gray);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--blue);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 15px;
  }
  .logo-name { font-size: 15px; font-weight: 600; color: var(--charcoal); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-user {
    font-size: 13px;
    color: var(--muted);
  }
  .nav-user span { font-weight: 600; color: var(--charcoal); }
  .btn-signout {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-signout:hover { border-color: var(--charcoal); color: var(--charcoal); }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

  /* WELCOME HERO */
  .welcome-hero {
    background: var(--navy);
    border-radius: 20px;
    padding: 2.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .welcome-blob-1 {
    position: absolute; top: -60px; right: -60px;
    width: 220px; height: 220px; border-radius: 50%;
    background: var(--blue); opacity: 0.2;
  }
  .welcome-blob-2 {
    position: absolute; bottom: -40px; left: 200px;
    width: 140px; height: 140px; border-radius: 50%;
    background: var(--amber); opacity: 0.15;
  }
  .welcome-eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 600;
    margin-bottom: 0.6rem;
    position: relative; z-index: 1;
  }
  .welcome-name {
    font-family: 'Fraunces', serif;
    font-size: 34px;
    font-weight: 600;
    color: white;
    line-height: 1.2;
    margin-bottom: 0.75rem;
    position: relative; z-index: 1;
  }
  .welcome-name em { font-style: italic; color: var(--amber); }
  .welcome-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    max-width: 500px;
    line-height: 1.65;
    position: relative; z-index: 1;
  }

  /* SECTION HEADERS */
  .section-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 1rem;
    margin-top: 2rem;
  }

  /* ENROLLED COURSE CARD */
  .enrolled-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1.5rem;
    align-items: center;
    transition: border-color 0.15s;
  }
  .enrolled-card:hover { border-color: var(--blue); }
  .enrolled-course-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 4px;
  }
  .enrolled-course-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .progress-bar-wrap {
    background: var(--soft-gray);
    border-radius: 6px;
    height: 8px;
    width: 100%;
    max-width: 320px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 6px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .btn-continue {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-continue:hover { background: var(--blue-dark); }

  /* COURSE CATALOG CARDS */
  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }
  .catalog-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    transition: border-color 0.15s, transform 0.15s;
    display: flex;
    flex-direction: column;
  }
  .catalog-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .catalog-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 40px;
    margin-bottom: 1rem;
  }
  .badge-amber { background: var(--amber-light); color: var(--amber-dark); }
  .badge-navy { background: var(--blue-light); color: var(--navy); }
  .catalog-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 0.5rem;
  }
  .catalog-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1.25rem;
    flex: 1;
  }
  .catalog-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .meta-tag {
    font-size: 12px;
    color: var(--muted);
  }
  .catalog-price {
    font-size: 22px;
    font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 0.5rem;
    font-family: 'Fraunces', serif;
  }
  .catalog-price span {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .btn-enroll {
    display: block;
    width: 100%;
    padding: 13px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: background 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .btn-enroll:hover { background: var(--blue-dark); }
  .btn-enroll-outline {
    display: block;
    width: 100%;
    padding: 13px;
    background: transparent;
    color: var(--navy);
    border: 1.5px solid var(--navy);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .btn-enroll-outline:hover { background: var(--navy); color: white; }

  /* LOADING STATE */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 14px;
    gap: 10px;
  }
  .loading-spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .enrolled-card { grid-template-columns: 1fr; }
    .welcome-name { font-size: 26px; }
    main { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="/dashboard.html" class="nav-logo">
    <div class="logo-mark">R</div>
    <span class="logo-name">Robinson House Learn</span>
  </a>
  <div class="nav-right">
    <div class="nav-user" id="nav-user">Loading...</div>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<main>
  <div id="dashboard-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      Loading your dashboard...
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://hinsbtiahzgccnjyovvc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnNidGlhaHpnY2NuanlvdnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjM0MjQsImV4cCI6MjA5ODM5OTQyNH0.aza9Xin6Qa3qAncGVl3P1TLGstKpA83Bqs8DywBoGyw';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function signOut() {
    await sb.auth.signOut();
    window.location.href = '/login.html';
  }

  async function loadDashboard() {
    // Check auth
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = '/login.html';
      return;
    }

    const user = session.user;

    // Get learner record
    const { data: learner } = await sb
      .from('learners')
      .select('*')
      .eq('auth_user_id', user.id)
      .maybeSingle();

    const firstName = learner?.full_name
      ? learner.full_name.split(' ')[0]
      : user.email.split('@')[0];

    document.getElementById('nav-user').innerHTML =
      'Welcome, <span>' + firstName + '</span>';

    // Get enrollments
    const { data: enrollments } = await sb
      .from('enrollments')
      .select('*, courses(*)')
      .eq('learner_id', learner?.id || '')
      .order('enrolled_at', { ascending: false });

    const hasEnrollments = enrollments && enrollments.length > 0;

    let html = '';

    // WELCOME HERO
    html += `
      <div class="welcome-hero">
        <div class="welcome-blob-1"></div>
        <div class="welcome-blob-2"></div>
        <div class="welcome-eyebrow">Your Learning Dashboard</div>
        <div class="welcome-name">Welcome back, <em>${firstName}.</em></div>
        <div class="welcome-sub">${
          hasEnrollments
            ? 'Pick up where you left off or explore more programs below.'
            : 'You\'re ready to start. Choose a program below and begin your AI journey today.'
        }</div>
      </div>
    `;

    // ENROLLED COURSES
    if (hasEnrollments) {
      html += '<div class="section-label">Your courses</div>';

      for (const enrollment of enrollments) {
        const course = enrollment.courses;

        // Get lesson progress for this enrollment
        const { data: progress } = await sb
          .from('lesson_progress')
          .select('id, completed')
          .eq('enrollment_id', enrollment.id);

        const { data: allLessons } = await sb
          .from('lessons')
          .select('id, modules!inner(course_id)')
          .eq('modules.course_id', course.id);

        const totalLessons = allLessons?.length || 0;
        const completedLessons = progress?.filter(p => p.completed).length || 0;
        const pct = totalLessons > 0 ? Math.round((completedLessons / totalLessons) * 100) : 0;

        html += `
          <div class="enrolled-card">
            <div>
              <div class="enrolled-course-title">${course.title}</div>
              <div class="enrolled-course-sub">${course.description}</div>
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width:${pct}%"></div>
              </div>
              <div class="progress-label">${completedLessons} of ${totalLessons} lessons complete · ${pct}%</div>
            </div>
            <a href="/course.html?id=${course.id}" class="btn-continue">
              ${pct === 0 ? 'Start course' : 'Continue'} →
            </a>
          </div>
        `;
      }
    }

    // COURSE CATALOG
    const enrolledCourseIds = (enrollments || []).map(e => e.course_id);

    const { data: allCourses } = await sb
      .from('courses')
      .select('*')
      .eq('is_published', true)
      .order('created_at');

    const unenrolledCourses = (allCourses || []).filter(c => !enrolledCourseIds.includes(c.id));

    if (unenrolledCourses.length > 0) {
      html += `<div class="section-label">${hasEnrollments ? 'Explore more programs' : 'Choose your program'}</div>`;
      html += '<div class="catalog-grid">';

      for (const course of unenrolledCourses) {
        const isUnlocked = course.slug === 'ai-unlocked';
        html += `
          <div class="catalog-card">
            <span class="catalog-badge ${isUnlocked ? 'badge-amber' : 'badge-navy'}">
              ${isUnlocked ? 'Public Workforce' : 'Higher Ed / Corporate'}
            </span>
            <div class="catalog-title">${course.title}</div>
            <div class="catalog-desc">${course.description}</div>
            <div class="catalog-meta">
              <span class="meta-tag">⏱ Self-paced</span>
              <span class="meta-tag" style="color:var(--teal); font-weight:600;">🎁 Module 1 free</span>
              <span class="meta-tag">🎓 Certificate</span>
              <span class="meta-tag">${isUnlocked ? '6 modules' : '7 modules · 3 CEUs'}</span>
            </div>
            <div class="catalog-price">
              ${isUnlocked ? '$297' : '$497'}
              <span>/ one-time · lifetime access</span>
            </div>
            <a href="/enroll.html?course=${course.slug}" class="btn-enroll">
              Enroll in ${course.title} →
            </a>
          </div>
        `;
      }

      html += '</div>';
    }

    // If fully enrolled in everything
    if (!hasEnrollments && unenrolledCourses.length === 0) {
      html += `
        <div class="loading" style="color:var(--muted);">
          No courses available right now. Check back soon.
        </div>
      `;
    }

    document.getElementById('dashboard-content').innerHTML = html;
  }

  loadDashboard();
</script>

</body>
</html>
