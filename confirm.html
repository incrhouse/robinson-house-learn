<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robinson House Learn — Confirming your account</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --charcoal: #1C1C1E;
    --amber: #E8A020;
    --amber-light: #FDF3E0;
    --amber-dark: #C8851A;
    --blue: #0066F5;
    --teal: #0F9E76;
    --teal-light: #E1F8F0;
    --muted: #8A8A85;
    --border: #E8E8E4;
    --red: #C0392B;
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #FFFFFF;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
  }
  .logo-mark {
    width: 48px; height: 48px;
    background: var(--blue);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 20px;
    margin: 0 auto 1.5rem;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    margin: 0 auto 1.25rem;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 8px;
  }
  p { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .icon-success {
    width: 48px; height: 48px;
    background: var(--teal-light);
    color: var(--teal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin: 0 auto 1.25rem;
  }
  .icon-error {
    width: 48px; height: 48px;
    background: #FBEAEA;
    color: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin: 0 auto 1.25rem;
  }
  .btn {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 12px 28px;
    background: var(--blue);
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-mark">R</div>
  <div id="content">
    <div class="spinner"></div>
    <h1>Confirming your account...</h1>
    <p>Just a moment while we finish setting things up.</p>
  </div>
  <p id="stuck-help" style="display:none; margin-top:1.25rem;">
    Taking longer than expected?
    <a href="/login.html" style="color:var(--blue); font-weight:600;">Try signing in</a>
    or contact <a href="mailto:cleveland@incrhouse.com" style="color:var(--blue); font-weight:600;">support</a>.
  </p>
</div>

<script>
  const SUPABASE_URL = 'https://hinsbtiahzgccnjyovvc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnNidGlhaHpnY2NuanlvdnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjM0MjQsImV4cCI6MjA5ODM5OTQyNH0.aza9Xin6Qa3qAncGVl3P1TLGstKpA83Bqs8DywBoGyw';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function showError(msg) {
    document.getElementById('content').innerHTML =
      '<div class="icon-error">!</div>' +
      '<h1>Something went wrong</h1>' +
      '<p>' + msg + '</p>' +
      '<a href="/login.html" class="btn">Back to sign in</a>';
  }

  function showSuccess(msg) {
    document.getElementById('content').innerHTML =
      '<div class="icon-success">✓</div>' +
      '<h1>You\\'re all set</h1>' +
      '<p>' + msg + '</p>' +
      '<a href="/dashboard.html" class="btn">Go to your dashboard</a>';
  }

  async function finishSetup() {
    // Supabase's JS client parses the access_token from the URL hash
    // asynchronously on page load via the onAuthStateChange listener.
    // Calling getSession() immediately can race ahead of that parsing,
    // so we wait for either a SIGNED_IN/INITIAL_SESSION event or a
    // short timeout as a fallback, instead of checking only once.

    const session = await new Promise((resolve) => {
      let resolved = false;

      const { data: listener } = sb.auth.onAuthStateChange((event, session) => {
        if (!resolved && session) {
          resolved = true;
          listener.subscription.unsubscribe();
          resolve(session);
        }
      });

      // Fallback: also try a direct check in case the event already fired
      sb.auth.getSession().then(({ data }) => {
        if (!resolved && data.session) {
          resolved = true;
          listener.subscription.unsubscribe();
          resolve(data.session);
        }
      });

      // Final fallback timeout so we never hang forever
      setTimeout(() => {
        if (!resolved) {
          resolved = true;
          listener.subscription.unsubscribe();
          resolve(null);
        }
      }, 6000);
    });

    if (!session || !session.user) {
      showError('We could not verify your confirmation link. It may have expired. Please try signing up again or contact support.');
      return;
    }

    const user = session.user;
    const meta = user.user_metadata || {};

    // Check if a learner record already exists (avoids duplicate on repeat visits)
    const { data: existingLearner } = await sb
      .from('learners')
      .select('id')
      .eq('auth_user_id', user.id)
      .maybeSingle();

    if (existingLearner) {
      showSuccess('Your account is already confirmed and ready to go.');
      return;
    }

    let cohort = null;
    if (meta.cohortId) {
      const { data: cohortData } = await sb
        .from('cohorts')
        .select('*')
        .eq('id', meta.cohortId)
        .single();
      cohort = cohortData;
    }

    const { data: learnerData, error: learnerError } = await sb
      .from('learners')
      .insert({
        auth_user_id: user.id,
        email: user.email,
        full_name: meta.fullName || null,
        organization_name: cohort ? cohort.organization_name : (meta.org || null)
      })
      .select()
      .single();

    if (learnerError) {
      showError('Your email was confirmed, but we had trouble finishing your profile setup. Please contact support at cleveland@incrhouse.com.');
      return;
    }

    if (cohort) {
      await sb.from('enrollments').insert({
        learner_id: learnerData.id,
        course_id: cohort.course_id,
        cohort_id: cohort.id,
        enrollment_type: 'cohort'
      });

      await sb.from('cohorts').update({
        seats_used: (cohort.seats_used || 0) + 1
      }).eq('id', cohort.id);

      showSuccess('You have been enrolled in ' + (cohort.name || 'your course') + '. Welcome!');
      return;
    }

    showSuccess('Your account is ready. Head to your dashboard to choose a course.');
  }

  setTimeout(() => {
    const help = document.getElementById('stuck-help');
    if (help) help.style.display = 'block';
  }, 5000);

  finishSetup();
</script>

</body>
</html>
